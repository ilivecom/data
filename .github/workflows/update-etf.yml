name: 🔄 Update ETF Premium Data

# ──────────────────────────────────────────────────────────────────────────────
# 定时拉取 A 股 ETF 溢价率数据并更新 public/etf-data.json
#
# 触发时机（北京时间，工作日）：
#   9:30–15:00 之间，每 15 分钟一次
#   UTC cron = BJT - 8h  →  01:30–07:00 UTC
#
# 注意：GitHub Actions 调度器有 ~5 min 抖动，属正常现象。
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 覆盖 BJT 9:15–15:15（01:15–07:15 UTC），每 15 分钟触发
    - cron: '15,30,45 1 * * 1-5'   # 09:15 09:30 09:45 BJT
    - cron: '*/15 2-6  * * 1-5'    # 10:00–14:45 BJT
    - cron: '0,15  7   * * 1-5'    # 15:00 15:15 BJT
    # 每天固定兜底快照：16:20 BJT（08:20 UTC）
    - cron: '20 8 * * *'

  # 支持手动触发（方便调试）
  workflow_dispatch:

permissions:
  contents: write   # 允许 bot 向 main 分支提交

concurrency:
  group: data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-etf:
    name: Fetch & Commit ETF Data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 拉取最新 commit，避免与并发 job 冲突
          fetch-depth: 1

      - name: Sync latest main
        run: git pull --ff-only origin main

      # 2. 配置 Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      # 3. 安装依赖
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # 4. 运行数据管道
      - name: Run ETF pipeline
        run: |
          python scripts/etf_pipeline.py \
            --json-out public/etf-data.json

      # 5. 若文件有变化则提交；不要使用 [skip ci]，否则 GitHub Pages 可能不会重新发布
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/etf-data.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "data: update ETF premium $(date -u +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "Push failed, rebasing on latest main (attempt ${attempt})"
              git pull --rebase origin main
            done
            exit 1
          fi
