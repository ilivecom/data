name: 📊 Update All Data

# ──────────────────────────────────────────────────────────────────────────────
# ETF 溢价 + 宏观指标 → public/*.json → commit → GitHub Pages 自动刷新
#
# 调度说明（GitHub cron 为 UTC，可能有 5–15 分钟延迟）：
#   工作日：仅 A 股交易时段触发，首个盘中更新点固定为 BJT 09:30
#           09:30 / 10:00 / 10:30 / 11:00 / 11:30 / 13:00 / 13:30 / 14:00 / 14:30 / 15:00
#   兜底：工作日 UTC 08:20 ≈ BJT 16:20 强制快照（收盘后）
#   实际执行前再用 A 股交易日历判定一次，避免节假日 / 调休误跑
#
# 历史问题备忘：
#   - [skip ci] 会阻止 Pages 部署 → 已移除
#   - 盘中首个更新点改到 BJT 09:30，避免开盘后仍停留在盘前数据
#   - ETF 多段复杂 cron 几乎不触发 → 保持显式半小时时点，避免 */15 模式不稳定
#   - ETF 失败会阻断 macro → update.sh 允许部分成功
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 工作日 09:30（UTC 01:30）
    - cron: '30 1 * * 1-5'
    # 工作日上午盘 10:00–11:30（UTC 02:00–03:30）
    - cron: '0,30 2-3 * * 1-5'
    # 工作日下午盘 13:00–14:30（UTC 05:00–06:30）
    - cron: '0,30 5-6 * * 1-5'
    # 工作日收盘点 15:00（UTC 07:00）
    - cron: '0 7 * * 1-5'
    # 工作日兜底：UTC 08:20 ≈ BJT 16:20（A 股收盘后）
    - cron: '20 8 * * 1-5'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-all:
    name: Fetch & Commit All Data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check CN Trading Day
        if: github.event_name == 'schedule'
        id: cn_trade_day
        run: |
          if python - <<'PY'
          import importlib.util
          from pathlib import Path

          spec = importlib.util.spec_from_file_location('etf_pipeline', Path('scripts/etf_pipeline.py'))
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          raise SystemExit(0 if mod._is_cn_trade_day() else 1)
          PY
          then
            echo "is_trade_day=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_trade_day=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Non-Trading Day
        if: github.event_name == 'schedule' && steps.cn_trade_day.outputs.is_trade_day != 'true'
        run: echo 'CN market closed today, skip scheduled update.'

      - name: Fetch, commit & push
        if: github.event_name != 'schedule' || steps.cn_trade_day.outputs.is_trade_day == 'true'
        env:
          PYTHON: python
          SKIP_GIT_PULL: '1'
        run: |
          git pull --rebase origin main
          bash scripts/update.sh
