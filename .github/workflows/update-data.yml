name: 📊 Update All Data

# ──────────────────────────────────────────────────────────────────────────────
# 统一数据更新：ETF 溢价率 + 宏观指标，合并为一个 workflow 确保调度可靠。
#
# 交易时段（工作日 9:15–15:15 BJT = 01:15–07:15 UTC）：每 15 分钟
# 非交易时段（工作日其余时间）：每小时
# 周末：每 2 小时
# ──────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # A股交易时段：工作日每 15 分钟（01:15–07:15 UTC = 09:15–15:15 BJT）
    - cron: '15,30,45 1 * * 1-5'
    - cron: '*/15 2-6 * * 1-5'
    - cron: '0,15 7 * * 1-5'
    # 工作日非交易时段：每小时
    - cron: '5 0,8-23 * * 1-5'
    # 周末：每 2 小时
    - cron: '5 */2 * * 0,6'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-all:
    name: Fetch & Commit All Data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ETF pipeline
        run: python scripts/etf_pipeline.py --json-out public/etf-data.json

      - name: Run macro pipeline
        run: python scripts/macro_pipeline.py --json-out public/macro-data.json

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/etf-data.json public/macro-data.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "data: update $(date -u +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "Push failed, rebasing on latest main (attempt ${attempt})"
              git pull --rebase origin main
            done
            exit 1
          fi
